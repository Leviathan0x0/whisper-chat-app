<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Whisper</title>
    <script src="https://kit.fontawesome.com/46358987b4.js" crossorigin="anonymous"></script>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./css/index.css" />
</head>

<body>
    <section class="chat">
        <div class="sidebar" id="sidebar"></div>
        <div id="messages"></div>
        <div class="chatSection" id="chatSection">
            <form id="message-form">
                <input type="text" name="message" id="chatBox" placeholder="Type your message..." autocomplete="off"
                    required />

                <button type="submit" name="send" id="send" title="Send message">
                    <i class="fa-solid fa-paper-plane" id="sendIcon" style="color: #ffffff"></i>
                </button>
            </form>

            <button class="send-location" id="send-location" title="location">
                <i class="fa-solid fa-location-dot fa-lg" id="locationIcon" style="color: #f95b06"></i>
            </button>
        </div>
    </section>

    <script id="message-template" type="text/html">
      <div class="message {{messageClass}}">
        <p>
          <span class="username">{{username}}</span>
          <span class="time">{{createdAt}}</span>
        </p>
        <p class="msg">{{message}}</p>
      </div>
    </script>
    <script id="location-message-template" type="text/html">
      <div class="message {{messageClass}}">
        <p>
          <span class="username">{{username}}</span>
          <span class="time">{{createdAt}}</span>
        </p>
        <p class="msg" class="location"><a href="{{locationURL}}" target="_blank">My current location</a></p>
      </div>
    </script>

    <script id="sidebar-template" type="text/html">
      <h2 class="room-title">{{room}}</h2>
      <h3 class="list-title">Users In Room</h3>
      <ul class="users">
        {{#users}}
        <li>{{username}}</li>
        {{/users}}
      </ul>
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/3.0.1/mustache.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.2/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.6.0/qs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./js/chat.js"></script>
    <script src="./js/animation.js"></script>
</body>

</html>
