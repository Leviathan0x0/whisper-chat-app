<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper</title>
    <script src="https://kit.fontawesome.com/46358987b4.js" crossorigin="anonymous"></script>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div class="centered-form">
        <div class="centered-form__box">
            <h1>Join Conversation</h1>
            <form action="/chat.html">
                <label for="username">Display Name</label>
                <input type="text" name="username" id="username" placeholder="E.g. Andrew Mead" required>
                <label for="room">Room</label>
                <input type="text" name="room" id="room" placeholder="E.g. Washington D.C." required>
                <button>Join</button>
            </form>
        </div>
    </div>
</body>

</html>
